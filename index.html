<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuksia — Diseño & Comunicación Visual</title>
  <meta name="description" content="Fuksia: estudio de diseño y comunicación visual. Conoce también Fuksia Labs, nuestro estudio de software, y su primer producto, ClockIn for Jira.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #faf8f5;
      color: #1a1410;
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; text-underline-offset: 3px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Sections */
    .section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      text-align: center;
    }

    .section-fuksia {
      height: 66.67vh;
      background: #faf8f5;
      border-bottom: 1px solid rgba(26,20,16,0.08);
      animation: fadeUp 0.9s ease 0.1s both;
    }

    .section-labs {
      height: 33.33vh;
      background: #111009;
      animation: fadeUp 0.9s ease 0.3s both;
      gap: 32px;
    }

    /* Fuksia logo */
    .logo-main {
      width: clamp(260px, 34vw, 560px);
      height: auto;
      display: block;
    }

    .tagline {
      margin-top: 20px;
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #9b9590;
    }
    .tagline .amp { color: #e8005a; }

    /* Labs logo */
    .logo-labs-wrap {
      display: inline-flex;
      text-decoration: none;
    }
    .logo-labs-wrap:hover { text-decoration: none; }

    .logo-labs-svg {
      width: clamp(220px, 30vw, 380px);
      height: auto;
      display: block;
    }

    /* Product link */
    .product-link {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 18px 28px;
      background: rgba(240,237,232,0.05);
      border: 1px solid rgba(240,237,232,0.12);
      border-radius: 12px;
      color: #f0ede8;
      font-size: 15px;
      font-weight: 400;
      transition: border-color 0.25s, background 0.25s;
      text-decoration: none;
    }
    .product-link:hover {
      border-color: rgba(232,0,90,0.4);
      background: rgba(232,0,90,0.06);
      text-decoration: none;
    }

    .product-link-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, #1a3b60, #0a6b65);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .product-link-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }
    .product-link-name { font-weight: 600; font-size: 15px; color: #f0ede8; }
    .product-link-sub  { font-size: 12px; color: #a09d9a; }
    .product-link-arrow { color: #888480; font-size: 18px; margin-left: 4px; }

    /* Footer */
    footer {
      padding: 24px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #111009;
      border-top: 1px solid rgba(240,237,232,0.06);
    }
    footer span { font-size: 12px; color: #444240; }
    footer a { font-size: 12px; color: #444240; }
    footer a:hover { color: #8b8880; text-decoration: none; }
    .footer-links { display: flex; gap: 20px; }
  </style>
</head>

    <p class="tagline">diseño <span class="amp">&amp;</span> comunicación visual</p>
  </section>
